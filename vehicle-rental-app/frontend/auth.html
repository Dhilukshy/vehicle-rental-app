<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access | DriveEase</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .auth-wrapper {
            display: flex;
            width: 900px;
            height: 600px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .auth-side-info {
            flex: 1;
            background: linear-gradient(225deg, var(--primary) 0%, #065f46 100%);
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: white;
            position: relative;
        }

        .auth-side-info h2 { font-size: 2.5rem; margin-bottom: 1rem; line-height: 1.2; }
        .auth-side-info p { opacity: 0.8; font-size: 1.1rem; }

        .auth-form-container {
            flex: 1.2;
            padding: 4rem;
            background: rgba(15, 23, 42, 0.6);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .role-badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(16, 185, 129, 0.2);
            color: var(--primary);
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 1rem;
            letter-spacing: 1px;
        }

        .input-group { position: relative; margin-bottom: 1.5rem; }

        .input-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 20px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        .auth-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 1rem;
        }

        .auth-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);
        }

        .toggle-link {
            text-align: center;
            margin-top: 2rem;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .toggle-link span {
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 850px) {
            .auth-side-info { display: none; }
            .auth-wrapper { width: 95%; max-width: 450px; }
        }
    </style>
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-side-info" id="side-panel">
            <h2 id="side-title">Welcome to the Elite Fleet.</h2>
            <p id="side-desc">Access thousands of premium vehicles or manage your existing listings with ease.</p>
            <div style="margin-top: 3rem; font-size: 0.9rem; opacity: 0.5;">© 2026 DriveEase Intelligence</div>
        </div>

        <div class="auth-form-container">
            <div id="role-indicator" class="role-badge">Customer Portal</div>
            <h1 style="margin-bottom: 0.5rem; font-weight: 700;">Login</h1>
            <p style="color: #94a3b8; margin-bottom: 2rem;">Please enter your credentials</p>

            <div class="input-group">
                <input type="email" placeholder="Email Address" id="email">
            </div>
            
            <div class="input-group">
                <input type="password" placeholder="Password" id="password">
            </div>

            <button class="auth-btn" onclick="processLogin()">Sign In</button>

            <p class="toggle-link">New to DriveEase? <span>Create account</span></p>
        </div>
    </div>

    <script>
        // Extract Role from URL
        const params = new URLSearchParams(window.location.search);
        const role = params.get('role') || 'Customer';
        
        // UI Updates based on Role
        const badge = document.getElementById('role-indicator');
        const sidePanel = document.getElementById('side-panel');
        const sideTitle = document.getElementById('side-title');

        badge.innerText = `${role} Portal`;

        if(role === 'Owner') {
            badge.style.color = '#fbbf24';
            badge.style.background = 'rgba(251, 191, 36, 0.1)';
            sidePanel.style.background = 'linear-gradient(225deg, #fbbf24 0%, #b45309 100%)';
            sideTitle.innerText = "Maximize Your Earnings Today.";
        }

        function processLogin() {
            // Animation for transition
            document.querySelector('.auth-wrapper').style.opacity = '0';
            document.querySelector('.auth-wrapper').style.transform = 'scale(0.9)';
            
            setTimeout(() => {
                if(role === 'Owner') window.location.href = 'owner-dashboard.html';
                else window.location.href = 'customer-dashboard.html';
            }, 500);
        }
    </script>
</body>
</html>
